name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend: lint + unit tests against real Postgres (pgvector) + Redis.
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: radar
          POSTGRES_PASSWORD: radar
          POSTGRES_DB: radar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U radar -d radar_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://radar:radar@localhost:5432/radar_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-not-for-production
      ENVIRONMENT: test
      AI_MODE: local
      EMBEDDING_PROVIDER: local
      EMBEDDING_DIM: "384"
      CELERY_EAGER: "true"
      CACHE_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src/

      - name: Run unit tests
        run: pytest tests/unit -q

  # ---------------------------------------------------------------------------
  # Frontend: install + production build.
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    env:
      # Build-time placeholders so `next build` doesn't fail on missing envs.
      API_BASE_URL: http://localhost:8000
      API_SECRET_KEY: ci-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
