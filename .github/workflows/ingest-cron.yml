name: Ingest Cron (free scheduler)

# -----------------------------------------------------------------------------
# On the Render FREE tier there is no always-on Celery beat. These scheduled
# GitHub Actions act as the "scheduler": they ping the API's internal admin
# endpoints so ingestion, rescoring, and Layer-3 intelligence actually run.
#
# Setup:
#   1. In the repo Settings -> Secrets and variables -> Actions, add:
#        API_BASE_URL   e.g. https://ai-research-radar-api.onrender.com
#        API_SECRET_KEY the same value as the backend SECRET_KEY / API auth key
#   2. Adjust the cron expressions below (times are UTC).
#
# CELERY_EAGER=true on the free tier means every /internal/* call below runs
# synchronously inside that one HTTP request — expect these to take a while
# (the weekly Layer-3 job especially). That's expected, not a bug.
#
# NOTE: this schedule (every 6h + weekly) is for driving the ingestion jobs,
# not for keeping the API warm for user traffic — it's far too infrequent for
# that (the free service sleeps after ~15 min idle). Warming for real visitors
# is handled separately by an external pinger (cron-job.org/UptimeRobot) hitting
# GET /health every ~10 min — see the README's "Free Cloud (Auto-Deploy)" section.
# -----------------------------------------------------------------------------

on:
  schedule:
    - cron: "0 */6 * * *"    # every 6 hours (UTC): ingest + enrich/rescoring
    - cron: "0 3 * * 1"      # weekly, Monday 03:00 UTC: full Layer-3 + briefing
  workflow_dispatch:          # allow manual runs

jobs:
  ingest-and-enrich:
    if: github.event.schedule == '0 */6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Warm the (possibly sleeping) free Render service
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          curl -fsS --retry 5 --retry-all-errors --retry-delay 15 \
            "${API_BASE_URL}/health" || echo "health warmup failed (continuing)"

      - name: Trigger ingestion (arXiv / HF / GitHub)
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
        run: |
          curl -fsS --max-time 300 -X POST \
            -H "Authorization: Bearer ${API_SECRET_KEY}" \
            "${API_BASE_URL}/api/v1/internal/ingest/trigger" \
            && echo "" && echo "ingest triggered" || echo "ingest trigger failed (continuing)"

      - name: Enrich + rescore (citations, affiliations, social, graph edges, daily Layer-3)
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
        run: |
          curl -fsS --max-time 1800 -X POST \
            -H "Authorization: Bearer ${API_SECRET_KEY}" \
            "${API_BASE_URL}/api/v1/internal/ingest/enrich" \
            && echo "" && echo "enrich triggered" || echo "enrich failed/timed out (continuing, safe to retry next run)"

  weekly-intelligence-and-briefing:
    if: github.event.schedule == '0 3 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Warm the (possibly sleeping) free Render service
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          curl -fsS --retry 5 --retry-all-errors --retry-delay 15 \
            "${API_BASE_URL}/health" || echo "health warmup failed (continuing)"

      - name: Daily Layer-3 recompute (DNA, breakthrough)
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
        run: |
          curl -fsS --max-time 300 -X POST \
            -H "Authorization: Bearer ${API_SECRET_KEY}" \
            "${API_BASE_URL}/api/v1/internal/intelligence/recompute" \
            && echo "" && echo "daily recompute triggered" || echo "daily recompute failed/timed out (continuing)"

      # These 6 used to be one chained call to /intelligence/recompute, which
      # ran all of them back-to-back inside a single ~30min request on the
      # 512MB free-tier dyno (CELERY_EAGER runs jobs in-process) - that's what
      # was causing the periodic "exceeded its memory limit" restarts. Each
      # is now its own request so the process gets a chance to release the
      # previous job's memory before the next one starts. If one step fails
      # or times out, the rest still run - safe to re-trigger individually
      # via workflow_dispatch or a direct POST to /intelligence/weekly/{job}.
      - name: "Layer-3 weekly: propagation, genealogy, cross-pollination, evolution, collaboration, frontier"
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
        run: |
          for job in propagation genealogy cross-pollination evolution collaboration frontier; do
            echo "--- ${job} ---"
            curl -fsS --max-time 400 -X POST \
              -H "Authorization: Bearer ${API_SECRET_KEY}" \
              "${API_BASE_URL}/api/v1/internal/intelligence/weekly/${job}" \
              && echo "" && echo "${job} triggered" || echo "${job} failed/timed out (continuing)"
          done

      - name: Generate weekly briefing
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
        run: |
          curl -fsS --max-time 300 -X POST \
            -H "Authorization: Bearer ${API_SECRET_KEY}" \
            "${API_BASE_URL}/api/v1/internal/briefing/generate" \
            && echo "" && echo "briefing generation triggered" || echo "briefing generation failed (continuing)"
